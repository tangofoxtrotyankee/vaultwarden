name: Railway Docker Image

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "Cargo.*"
      - "build.rs"
      - "rust-toolchain.toml"
      - "docker/Dockerfile.debian"
      - "docker/Dockerfile.alpine"
      - "docker/Dockerfile.j2"
      - "docker/DockerSettings.yaml"
      - "macros/**"
      - ".github/workflows/railway-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build fork image for Railway
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd146aa1e8c94c4b26acd7e02ebd1f7c375d # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14493af8ad96076438420 # v6.18.0
        with:
          context: .
          file: docker/Dockerfile.debian
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
